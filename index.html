<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCOUT — Athlete Finance</title>
  </head>
  <body>
    <!-- Runs before any JS bundle so dark class is set when useTheme.js initialises.
         Default is dark mode; only skip if the user has explicitly saved 'light'. -->
    <script>
      (function () {
        if (localStorage.getItem('scout-theme') !== 'light') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
